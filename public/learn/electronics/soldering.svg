    <text x="262" y="106" fill="#991b1b">✗ မှုန် · ဆူး = cold joint</text>
  </g>
  <text x="220" y="150" text-anchor="middle" font-size="10" fill="#334155">မလုပ်ဖြစ်ရင် — multimeter နဲ့ continuity/voltage စစ်</text>
  <text x="220" y="172" text-anchor="middle" font-size="9" fill="#64748b">ဆက်ကြိုး · polarity · ပါဝါ တစ်ဆင့်ချင်း စစ်ဆေး</text>
</svg>
