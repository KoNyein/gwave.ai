<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="sans-serif">
  <rect x="1" y="1" width="418" height="238" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="115" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">Series (တန်းဆက်)</text>
  <rect x="40" y="80" width="150" height="80" rx="6" fill="none" stroke="#334155" stroke-width="2"/>
  <rect x="70" y="70" width="30" height="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <rect x="125" y="70" width="30" height="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="115" y="185" text-anchor="middle" font-size="10" fill="#64748b">လျှပ်စီး လမ်း ၁ ခုတည်း — တစ်ခုပြတ် အကုန်ရပ်</text>
  <text x="305" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">Parallel (ပြိုင်ဆက်)</text>
  <rect x="230" y="80" width="150" height="80" rx="6" fill="none" stroke="#334155" stroke-width="2"/>
  <line x1="265" y1="80" x2="265" y2="160" stroke="#334155" stroke-width="2"/>
  <line x1="345" y1="80" x2="345" y2="160" stroke="#334155" stroke-width="2"/>
  <rect x="250" y="110" width="30" height="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <rect x="330" y="110" width="30" height="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="305" y="185" text-anchor="middle" font-size="10" fill="#64748b">လမ်း နှစ်ခု — တစ်ခုပြတ်လည်း ကျန်တာ ဆက်အလုပ်လုပ်</text>
  <text x="210" y="215" text-anchor="middle" font-size="10.5" fill="#334155">Series: R စုစုပေါင်း တိုး · Parallel: R စုစုပေါင်း လျော့</text>
  <text x="210" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Series နဲ့ Parallel</text>
</svg>
