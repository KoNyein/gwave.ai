  <text x="219" y="94" text-anchor="middle" font-size="8.5" fill="#334155">rule</text>
  <text x="220" y="156" text-anchor="middle" font-size="10" fill="#334155">Sensor ဖတ်ချက် → လူ မလိုဘဲ ကိရိယာ အလိုအလျောက် တုံ့ပြန်</text>
  <text x="220" y="176" text-anchor="middle" font-size="9" fill="#64748b">မြေခြောက် → ရေလောင်း · အပူတက် → fan — ၂၄/၇ စောင့်</text>
