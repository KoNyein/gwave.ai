<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="sans-serif">
  <rect x="1" y="1" width="418" height="238" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="120" y1="50" x2="120" y2="200" stroke="#334155" stroke-width="2"/>
  <rect x="103" y="70" width="34" height="34" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="146" y="92" font-size="11" fill="#92400e" font-weight="bold">R1 = 10kΩ</text>
  <rect x="103" y="140" width="34" height="34" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="146" y="162" font-size="11" fill="#92400e" font-weight="bold">R2 = 10kΩ</text>
  <text x="120" y="42" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold">Vin = 5V</text>
  <text x="120" y="218" text-anchor="middle" font-size="11" fill="#334155" font-weight="bold">GND</text>
  <circle cx="120" cy="122" r="4" fill="#16a34a"/>
  <line x1="124" y1="122" x2="230" y2="122" stroke="#16a34a" stroke-width="2"/>
  <text x="238" y="126" font-size="12" fill="#166534" font-weight="bold">Vout = 2.5V</text>
  <text x="270" y="165" text-anchor="middle" font-size="11" fill="#334155">Vout = Vin × R2 / (R1+R2)</text>
  <text x="270" y="185" text-anchor="middle" font-size="10" fill="#64748b">5V sensor ကို 3.3V board နဲ့ ချိတ်ရာမှာ အသုံးများ</text>
  <text x="210" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Voltage Divider</text>
</svg>
