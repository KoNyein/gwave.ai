<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 190" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="188" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Diode — current တစ်လမ်းသွား</text>
  <g stroke="#334155" stroke-width="2">
    <line x1="40" y1="70" x2="70" y2="70"/><path d="M70 58 l24 12 l-24 12 z" fill="#dbeafe"/><line x1="94" y1="58" x2="94" y2="82"/><line x1="94" y1="70" x2="124" y2="70"/>
  </g>
  <text x="150" y="74" font-size="9" fill="#16a34a">→ စီး (forward)</text>
  <g stroke="#334155" stroke-width="2">
    <line x1="40" y1="110" x2="70" y2="110"/><path d="M94 98 l-24 12 l24 12 z" fill="#fee2e2"/><line x1="70" y1="98" x2="70" y2="122"/><line x1="70" y1="110" x2="40" y2="110"/><line x1="94" y1="110" x2="124" y2="110"/>
  </g>
  <text x="150" y="114" font-size="9" fill="#dc2626">✗ ပိတ် (reverse)</text>
  <g font-size="8.5" fill="#334155">
    <rect x="252" y="56" width="160" height="24" rx="5" fill="#fef3c7" stroke="#d97706"/><text x="262" y="72">LED — စီးရင် မီးလင်း</text>
    <rect x="252" y="86" width="160" height="24" rx="5" fill="#e0f2fe" stroke="#0284c7"/><text x="262" y="102">Zener — voltage ကန့်</text>
    <rect x="252" y="116" width="160" height="24" rx="5" fill="#dcfce7" stroke="#16a34a"/><text x="262" y="132">Rectifier — AC→DC</text>
  </g>
  <text x="220" y="170" text-anchor="middle" font-size="9.5" fill="#64748b">တစ်လမ်းသွား သဘာဝ — ကာကွယ်/ပြောင်းလဲ/အချက်ပြ အသုံးများ</text>
</svg>
