<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 190" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="188" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Electricity — အီလက်ထရွန် စီးဆင်းမှု</text>
  <rect x="40" y="80" width="360" height="34" rx="17" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="30" y="72" font-size="9" fill="#dc2626">− (များ)</text>
  <text x="392" y="72" font-size="9" fill="#2563eb">+ (နည်း)</text>
  <g fill="#2563eb">
    <circle cx="80" cy="97" r="7"/><circle cx="140" cy="97" r="7"/><circle cx="200" cy="97" r="7"/><circle cx="260" cy="97" r="7"/><circle cx="320" cy="97" r="7"/>
  </g>
  <g fill="#fff" font-size="9" text-anchor="middle" font-weight="bold">
    <text x="80" y="101">e−</text><text x="140" y="101">e−</text><text x="200" y="101">e−</text><text x="260" y="101">e−</text><text x="320" y="101">e−</text>
  </g>
  <text x="360" y="101" font-size="14" fill="#16a34a">→</text>
  <text x="220" y="146" text-anchor="middle" font-size="10" fill="#334155">အားနည်းတဲ့ (−) ဘက်ကနေ (+) ဘက် — အီလက်ထရွန်တွေ တွန်းစီး</text>
  <text x="220" y="168" text-anchor="middle" font-size="9" fill="#64748b">ရေစီးလို — ဒီစီးဆင်းမှုက မီး/မော်တာ/ချစ်ပ်တွေ မောင်း</text>
</svg>
