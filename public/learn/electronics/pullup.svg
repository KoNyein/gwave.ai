<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 230" font-family="sans-serif">
  <rect x="1" y="1" width="418" height="228" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="120" y="50" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold">3.3V</text>
  <line x1="120" y1="55" x2="120" y2="80" stroke="#334155" stroke-width="2"/>
  <rect x="103" y="80" width="34" height="30" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="150" y="100" font-size="10" fill="#92400e" font-weight="bold">10kΩ pull-up</text>
  <line x1="120" y1="110" x2="120" y2="140" stroke="#334155" stroke-width="2"/>
  <circle cx="120" cy="140" r="4" fill="#16a34a"/>
  <line x1="124" y1="140" x2="210" y2="140" stroke="#16a34a" stroke-width="2"/>
  <text x="218" y="144" font-size="11" fill="#166534" font-weight="bold">GPIO pin</text>
  <line x1="120" y1="144" x2="120" y2="170" stroke="#334155" stroke-width="2"/>
  <circle cx="120" cy="176" r="5" fill="none" stroke="#334155" stroke-width="2"/>
  <line x1="125" y1="171" x2="140" y2="160" stroke="#334155" stroke-width="2"/>
  <line x1="120" y1="182" x2="120" y2="200" stroke="#334155" stroke-width="2"/>
  <text x="120" y="215" text-anchor="middle" font-size="10" fill="#334155">GND</text>
  <text x="300" y="120" text-anchor="middle" font-size="10.5" fill="#334155">ခလုတ် မနှိပ် → pin = HIGH (1)</text>
  <text x="300" y="138" text-anchor="middle" font-size="10.5" fill="#334155">ခလုတ် နှိပ် → pin = LOW (0)</text>
  <text x="300" y="165" text-anchor="middle" font-size="10" fill="#64748b">Pull-up မပါရင် pin က "လွင့်နေ" (floating)</text>
  <text x="300" y="180" text-anchor="middle" font-size="10" fill="#64748b">— တန်ဖိုး မတည်ငြိမ်</text>
  <text x="210" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Pull-up Resistor + ခလုတ်</text>
</svg>
