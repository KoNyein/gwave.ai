<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 190" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="188" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Resistor — current ကို ထိန်း</text>
  <line x1="40" y1="90" x2="120" y2="90" stroke="#334155" stroke-width="2.5"/>
  <rect x="120" y="72" width="120" height="36" rx="6" fill="#e8c39e" stroke="#92400e"/>
  <rect x="140" y="72" width="8" height="36" fill="#8b4513"/>
  <rect x="158" y="72" width="8" height="36" fill="#dc2626"/>
  <rect x="176" y="72" width="8" height="36" fill="#d97706"/>
  <rect x="206" y="72" width="8" height="36" fill="#eab308"/>
  <line x1="240" y1="90" x2="330" y2="90" stroke="#334155" stroke-width="2.5"/>
  <circle cx="360" cy="90" r="14" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/><text x="360" y="95" text-anchor="middle" font-size="11">💡</text>
  <text x="180" y="64" text-anchor="middle" font-size="8.5" fill="#92400e">အရောင် bands = တန်ဖိုး (Ω)</text>
  <text x="220" y="140" text-anchor="middle" font-size="10" fill="#334155">Current များလွန်းရင် LED ပျက် — resistor က လျှော့ပေး</text>
  <text x="220" y="164" text-anchor="middle" font-size="9" fill="#64748b">I = V / R — R ကြီးလေ current နည်းလေ (Ohm's Law)</text>
</svg>
