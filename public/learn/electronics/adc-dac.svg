  <text x="62" y="128" text-anchor="middle" font-size="8.5" fill="#1e40af">analog လှိုင်း</text>
  <rect x="112" y="82" width="60" height="36" rx="7" fill="#dbeafe" stroke="#2563eb"/>
  <text x="142" y="104" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">ADC</text>
  <line x1="94" y1="100" x2="110" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#ad)"/>
  <line x1="172" y1="100" x2="188" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#ad)"/>
  <text x="220" y="96" text-anchor="middle" font-size="10" font-family="monospace" fill="#166534">0110 1011</text>
  <text x="220" y="112" text-anchor="middle" font-size="8" fill="#334155">ဂဏန်း (digital)</text>
  <line x1="252" y1="100" x2="268" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#ad)"/>
  <rect x="270" y="82" width="60" height="36" rx="7" fill="#dcfce7" stroke="#16a34a"/>
