  <text x="220" y="160" text-anchor="middle" font-size="10" fill="#334155">ADC — sensor analog ဖတ် · DAC — digital ကနေ analog ထုတ်</text>
  <text x="220" y="180" text-anchor="middle" font-size="9" fill="#64748b">resolution မြင့်လေ (bit များ) တိကျလေ</text>
