<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 190" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="188" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="t1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Temperature Sensor — အပူ → ဂဏန်း</text>
  <g>
    <rect x="60" y="60" width="20" height="70" rx="10" fill="#f1f5f9" stroke="#dc2626" stroke-width="2"/>
    <rect x="64" y="90" width="12" height="40" fill="#dc2626"/>
    <circle cx="70" cy="130" r="12" fill="#dc2626"/>
  </g>
  <text x="70" y="152" text-anchor="middle" font-size="8.5" fill="#334155">အပူ</text>
  <line x1="96" y1="100" x2="150" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#t1)"/>
  <rect x="152" y="80" width="110" height="40" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="207" y="98" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e40af">DHT22 / LM35</text>
  <text x="207" y="112" text-anchor="middle" font-size="8" fill="#1e40af">sensor</text>
  <line x1="262" y1="100" x2="316" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#t1)"/>
  <rect x="318" y="80" width="92" height="40" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="364" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">28.5°C</text>
  <text x="220" y="160" text-anchor="middle" font-size="10" fill="#334155">မှန်ကန်တဲ့ အပူချိန် — greenhouse fan/heater ကို ဆုံးဖြတ်</text>
  <text x="220" y="180" text-anchor="middle" font-size="9" fill="#64748b">DHT22 က စိုထိုင်းဆ (humidity) ပါ တစ်ခါတည်း ဖတ်</text>
</svg>
