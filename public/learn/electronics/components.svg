<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Components — circuit အစိတ်အပိုင်းများ</text>
  <g font-size="9" text-anchor="middle" fill="#334155">
    <rect x="30" y="56" width="86" height="56" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="48" y="78" width="50" height="14" fill="#fde68a" stroke="#92400e"/><text x="73" y="106">Resistor</text>
    <rect x="128" y="56" width="86" height="56" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <circle cx="171" cy="80" r="12" fill="#fca5a5" stroke="#dc2626"/><text x="171" y="106">LED</text>
    <rect x="226" y="56" width="86" height="56" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <line x1="260" y1="72" x2="260" y2="90" stroke="#334155" stroke-width="2"/><line x1="270" y1="72" x2="270" y2="90" stroke="#334155" stroke-width="2"/><text x="269" y="106">Capacitor</text>
    <rect x="324" y="56" width="86" height="56" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <line x1="348" y1="82" x2="366" y2="82" stroke="#334155" stroke-width="2"/><line x1="366" y1="82" x2="382" y2="70" stroke="#334155" stroke-width="2"/><circle cx="348" cy="82" r="2.5" fill="#334155"/><text x="367" y="106">Switch</text>
  </g>
  <g font-size="9" text-anchor="middle" fill="#334155">
    <rect x="80" y="122" width="120" height="52" rx="8" fill="#eff6ff" stroke="#2563eb"/><text x="140" y="142" font-weight="bold" fill="#1e40af">Battery 🔋</text><text x="140" y="160" font-size="8" fill="#1e40af">တွန်းအား</text>
    <rect x="240" y="122" width="120" height="52" rx="8" fill="#f0fdf4" stroke="#16a34a"/><text x="300" y="142" font-weight="bold" fill="#166534">Diode ▷|</text><text x="300" y="160" font-size="8" fill="#166534">တစ်လမ်းသွား</text>
  </g>
  <text x="220" y="192" text-anchor="middle" font-size="9" fill="#64748b">ဒီအပိုင်းလေးတွေ ပေါင်းဆက် → circuit တစ်ခု တည်ဆောက်</text>
</svg>
