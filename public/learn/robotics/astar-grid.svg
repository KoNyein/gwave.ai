  <text x="210" y="236" text-anchor="middle" font-size="10.5" fill="#334155">f(n) = g(n) စရိတ် + h(n) ခန့်မှန်း — အနည်းဆုံး f ကို အရင်စစ် → အတိုဆုံးလမ်း</text>
  <text x="210" y="32" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">A* — Grid ပေါ်မှာ လမ်းရှာခြင်း</text>
