<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="sans-serif">
  <rect x="1" y="1" width="418" height="238" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="150" y="90" width="120" height="90" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <rect x="135" y="105" width="14" height="60" rx="6" fill="#334155"/>
  <rect x="271" y="105" width="14" height="60" rx="6" fill="#334155"/>
  <defs><marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#16a34a"/></marker>
  <marker id="c" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#dc2626"/></marker></defs>
  <line x1="142" y1="100" x2="142" y2="45" stroke="#dc2626" stroke-width="3" marker-end="url(#c)"/>
  <text x="120" y="40" font-size="12" fill="#dc2626" font-weight="bold">vL (နှေး)</text>
  <line x1="278" y1="100" x2="278" y2="20" stroke="#16a34a" stroke-width="3" marker-end="url(#b)"/>
  <text x="288" y="30" font-size="12" fill="#16a34a" font-weight="bold">vR (မြန်)</text>
  <path d="M210,85 C240,55 270,50 300,60" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5" marker-end="url(#b)"/>
  <text x="310" y="70" font-size="11" fill="#2563eb">ကွေ့သည်</text>
  <circle cx="210" cy="135" r="4" fill="#dc2626"/>
  <text x="210" y="205" text-anchor="middle" font-size="12" fill="#334155">v = (vL + vR) / 2    ·    ω = (vR − vL) / L</text>
  <text x="210" y="222" text-anchor="middle" font-size="10" fill="#64748b">ဘီးနှစ်ဖက် အမြန်ခြားရင် ကွေ့သည် · တူရင် တည့်တည့်သွား</text>
</svg>
