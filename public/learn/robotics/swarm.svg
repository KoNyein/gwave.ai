    <text x="175" y="115">🤖</text><text x="225" y="118">🤖</text><text x="270" y="112">🤖</text>
  </g>
  <g stroke="#7c3aed" stroke-width="1" opacity="0.5">
    <line x1="150" y1="75" x2="200" y2="65"/><line x1="200" y1="65" x2="250" y2="77"/>
