  <text x="120" y="54" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#dc2626">ဖိအား မထိန်း</text>
  <rect x="70" y="86" width="100" height="30" rx="6" fill="#e2e8f0" stroke="#334155"/>
  <text x="120" y="106" text-anchor="middle" font-size="14">🤏🍅💥</text>
  <text x="120" y="134" text-anchor="middle" font-size="8" fill="#991b1b">ကျပ်လွန်း → ပျက်</text>
