  <line x1="200" y1="130" x2="320" y2="110" stroke="#16a34a" stroke-width="8" stroke-linecap="round"/>
  <circle cx="100" cy="210" r="12" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <circle cx="200" cy="130" r="10" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <circle cx="320" cy="110" r="7" fill="#dc2626"/>
  <text x="332" y="103" font-size="12" fill="#dc2626" font-weight="bold">(x, y)</text>
