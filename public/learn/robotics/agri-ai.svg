  <text x="220" y="158" text-anchor="middle" font-size="10" fill="#334155">ပိုးရောဂါ စောစီး ဖမ်း · ရေ/ဆေး ချွေ · အထွက် တိုး</text>
  <text x="220" y="178" text-anchor="middle" font-size="9" fill="#64748b">လူ တစ်ယောက်တည်း စိုက်ခင်း ကျယ်ကျယ် စီမံနိုင်</text>
