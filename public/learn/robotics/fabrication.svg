  <text x="220" y="139" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#9d174d">🤖 ကိုယ်ပိုင် robot</text>
  <text x="220" y="172" text-anchor="middle" font-size="9" fill="#64748b">CAD ဒီဇိုင်း → print/cut → တပ်ဆင် — idea ကနေ တကယ့်စက်</text>
