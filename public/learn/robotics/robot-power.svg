  <line x1="250" y1="96" x2="284" y2="82" stroke="#64748b" stroke-width="2" marker-end="url(#rp)"/>
  <line x1="250" y1="112" x2="284" y2="126" stroke="#64748b" stroke-width="2" marker-end="url(#rp)"/>
  <rect x="288" y="66" width="120" height="32" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="348" y="86" text-anchor="middle" font-size="8.5" fill="#6d28d9">🧠 controller (5V)</text>
