  <text x="348" y="130" text-anchor="middle" font-size="8.5" fill="#166534">⚙ motor (12V)</text>
  <text x="220" y="166" text-anchor="middle" font-size="9.5" fill="#64748b">motor က current များစား — logic နဲ့ ခွဲ · capacity (mAh) = ကြာချိန်</text>
