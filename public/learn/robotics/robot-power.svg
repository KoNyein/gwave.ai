  <text x="73" y="114" text-anchor="middle" font-size="8" fill="#92400e">LiPo · Li-ion</text>
  <line x1="116" y1="104" x2="150" y2="104" stroke="#64748b" stroke-width="2" marker-end="url(#rp)"/>
  <rect x="154" y="82" width="96" height="44" rx="7" fill="#dbeafe" stroke="#2563eb"/>
  <text x="202" y="100" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e40af">Regulator</text>
