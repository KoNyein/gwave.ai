  <rect x="30" y="70" width="150" height="24" rx="4" fill="#0FBD8C" stroke="#0B8E69"/>
  <text x="42" y="87" font-size="10" font-weight="bold" fill="#fff">🖊 pen down</text>
  <rect x="30" y="98" width="150" height="24" rx="4" fill="#0FBD8C" stroke="#0B8E69"/>
  <text x="42" y="115" font-size="10" font-weight="bold" fill="#fff">အရောင် ▮ ပြောင်း</text>
  <rect x="30" y="126" width="150" height="24" rx="4" fill="#4C97FF" stroke="#3373CC"/>
  <text x="42" y="143" font-size="10" font-weight="bold" fill="#fff">ခြေလှမ်း 100 ရှေ့</text>
