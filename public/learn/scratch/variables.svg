<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Variables — အမှတ် သိမ်းတဲ့ ပုံး</text>
  <rect x="30" y="80" width="170" height="30" rx="5" fill="#FF8C1A" stroke="#DB6E00"/>
  <text x="42" y="100" font-size="10.5" font-weight="bold" fill="#fff">score ကို 1 တိုး</text>
  <rect x="30" y="118" width="170" height="30" rx="5" fill="#FF8C1A" stroke="#DB6E00"/>
  <text x="42" y="138" font-size="10.5" font-weight="bold" fill="#fff">score ကို 0 ထား</text>
  <rect x="266" y="84" width="140" height="46" rx="10" fill="#fff7ed" stroke="#FF8C1A"/>
  <text x="336" y="104" text-anchor="middle" font-size="10" fill="#9a3412">score</text>
  <rect x="300" y="108" width="72" height="16" rx="4" fill="#FF8C1A"/>
  <text x="336" y="121" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">7</text>
  <text x="336" y="150" text-anchor="middle" font-size="9" fill="#64748b">တန်ဖိုး ပြောင်းလဲနိုင်</text>
  <text x="220" y="176" text-anchor="middle" font-size="10" fill="#334155">score၊ ကျန်းမာရေး၊ အသက် — ဂဏန်း/စာသား မှတ်ထားတဲ့ နာမည်</text>
</svg>
