<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="ph" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 z" fill="#2563eb"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Mini Physics Engine — bounce</text>
  <line x1="30" y1="160" x2="410" y2="160" stroke="#166534" stroke-width="3"/>
  <path d="M60 150 Q100 60 140 150 Q170 90 200 150 Q225 110 250 150" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="60" cy="150" r="9" fill="#38bdf8"/>
  <circle cx="140" cy="150" r="9" fill="#38bdf8" opacity="0.6"/>
  <circle cx="250" cy="150" r="9" fill="#38bdf8" opacity="0.4"/>
  <line x1="250" y1="150" x2="250" y2="120" stroke="#2563eb" stroke-width="2" marker-end="url(#ph)"/>
  <g font-size="9" font-family="monospace" fill="#334155">
    <text x="278" y="70">vy += gravity</text>
    <text x="278" y="88">y  += vy</text>
    <text x="278" y="106">if (y &gt; ground)</text>
    <text x="292" y="124">vy *= -0.7 // bounce</text>
  </g>
  <text x="220" y="186" text-anchor="middle" font-size="9" fill="#64748b">gravity + restitution — ခုန်တိုင်း အား လျော့ (damping)</text>
</svg>
