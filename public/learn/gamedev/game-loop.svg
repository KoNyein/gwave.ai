<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="gl" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">The Game Loop — 60 FPS နှလုံးခုန်</text>
  <rect x="60" y="76" width="120" height="48" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="120" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">update()</text>
  <text x="120" y="114" text-anchor="middle" font-size="8.5" fill="#1e40af">တွက် — position, AI</text>
  <rect x="260" y="76" width="120" height="48" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="320" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">render()</text>
  <text x="320" y="114" text-anchor="middle" font-size="8.5" fill="#166534">ဆွဲ — canvas ပေါ်</text>
  <path d="M180 90 L258 90" stroke="#64748b" stroke-width="2" marker-end="url(#gl)"/>
  <path d="M260 110 Q220 140 180 110" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#gl)"/>
  <path d="M60 100 Q20 130 60 150 L120 150" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#gl)"/>
  <text x="120" y="165" text-anchor="middle" font-size="8.5" fill="#6d28d9">requestAnimationFrame — တစ်စက္ကန့် ၆၀ ကြိမ်</text>
  <text x="220" y="188" text-anchor="middle" font-size="9.5" fill="#334155">frame တိုင်း — တွက် → ဆွဲ → ထပ် (loop)</text>
</svg>
