<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="ip" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Input Management — keys ကို state ထဲ</text>
  <g font-size="9" text-anchor="middle">
    <rect x="40" y="70" width="40" height="26" rx="4" fill="#dbeafe" stroke="#2563eb"/><text x="60" y="87" fill="#1e40af">W</text>
    <rect x="18" y="102" width="40" height="26" rx="4" fill="#dbeafe" stroke="#2563eb"/><text x="38" y="119" fill="#1e40af">A</text>
    <rect x="62" y="102" width="40" height="26" rx="4" fill="#dbeafe" stroke="#2563eb"/><text x="82" y="119" fill="#1e40af">S</text>
    <rect x="106" y="102" width="40" height="26" rx="4" fill="#dbeafe" stroke="#2563eb"/><text x="126" y="119" fill="#1e40af">D</text>
  </g>
  <line x1="150" y1="100" x2="196" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#ip)"/>
  <rect x="200" y="76" width="120" height="48" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="260" y="96" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d28d9">keys = {}</text>
  <text x="260" y="112" text-anchor="middle" font-size="8" fill="#6d28d9">keydown→true keyup→false</text>
  <line x1="320" y1="100" x2="360" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#ip)"/>
  <text x="388" y="96" text-anchor="middle" font-size="14">🧍</text>
  <text x="388" y="116" text-anchor="middle" font-size="7.5" fill="#334155">update ထဲ ဖတ်</text>
  <text x="220" y="160" text-anchor="middle" font-size="9" font-family="monospace" fill="#334155">if (keys["ArrowUp"]) player.jump()</text>
  <text x="220" y="182" text-anchor="middle" font-size="9" fill="#64748b">event ထဲ တိုက်ရိုက်မလုပ်ဘဲ — state မှတ်ပြီး loop ထဲ ဖတ်</text>
</svg>
