<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Particle System — array နဲ့ effect</text>
  <circle cx="140" cy="105" r="6" fill="#f97316"/>
  <g fill="#fbbf24"><circle cx="100" cy="70" r="4"/><circle cx="180" cy="72" r="4"/><circle cx="90" cy="120" r="4"/><circle cx="188" cy="130" r="4"/><circle cx="120" cy="150" r="3"/><circle cx="170" cy="150" r="3"/><circle cx="75" cy="95" r="3"/><circle cx="205" cy="100" r="3"/></g>
  <g stroke="#f97316" stroke-width="1" opacity="0.5"><line x1="140" y1="105" x2="100" y2="70"/><line x1="140" y1="105" x2="180" y2="72"/><line x1="140" y1="105" x2="90" y2="120"/><line x1="140" y1="105" x2="188" y2="130"/></g>
  <text x="140" y="176" text-anchor="middle" font-size="9" fill="#334155">💥 ပေါက်ကွဲမှု</text>
  <g font-size="9" font-family="monospace" fill="#334155">
    <text x="250" y="70">particles.push({</text>
    <text x="262" y="86">x, y, vx, vy,</text>
    <text x="262" y="102">life: 1.0 })</text>
    <text x="250" y="126">// update: x+=vx</text>
    <text x="250" y="142">// life -= dt</text>
    <text x="250" y="158">// life&lt;=0 → ဖျက်</text>
  </g>
  <text x="220" y="188" text-anchor="middle" font-size="8.5" fill="#64748b">အမှုန်လေး အများ — မီးခိုး · မိုး · ပေါက်ကွဲ</text>
</svg>
