<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="gj" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 z" fill="#dc2626"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Gravity &amp; Jumping</text>
  <line x1="30" y1="160" x2="410" y2="160" stroke="#166534" stroke-width="3"/>
  <path d="M60 158 Q150 60 260 158" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="60" cy="158" r="10" fill="#fbbf24" stroke="#d97706"/>
  <line x1="60" y1="146" x2="60" y2="110" stroke="#16a34a" stroke-width="3" marker-end="url(#gj)"/>
  <text x="88" y="120" font-size="8.5" fill="#166534">jump (vy = −)</text>
  <circle cx="155" cy="88" r="10" fill="#fbbf24" stroke="#d97706"/>
  <line x1="260" y1="120" x2="260" y2="150" stroke="#dc2626" stroke-width="3" marker-end="url(#gj)"/>
  <text x="292" y="138" font-size="8.5" fill="#991b1b">gravity (vy +)</text>
  <circle cx="260" cy="158" r="10" fill="#fbbf24" stroke="#d97706"/>
  <g font-size="9" font-family="monospace" fill="#334155">
    <text x="300" y="70">vy += G      // ဆွဲငင်</text>
    <text x="300" y="86">y  += vy</text>
    <text x="300" y="102">// ground → vy=0</text>
  </g>
  <text x="220" y="186" text-anchor="middle" font-size="9" fill="#64748b">ခုန် = အပေါ်တွန်း တစ်ချက် · gravity = frame တိုင်း အောက်ဆွဲ</text>
</svg>
