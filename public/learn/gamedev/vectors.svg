<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="vc" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 z" fill="#2563eb"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Movement — Velocity · Acceleration · Friction</text>
  <circle cx="90" cy="105" r="14" fill="#fbbf24" stroke="#d97706"/>
  <line x1="104" y1="105" x2="200" y2="105" stroke="#2563eb" stroke-width="3" marker-end="url(#vc)"/>
  <text x="155" y="96" text-anchor="middle" font-size="9" fill="#1e40af">velocity</text>
  <line x1="104" y1="118" x2="150" y2="118" stroke="#16a34a" stroke-width="2.5" marker-end="url(#vc)"/>
  <text x="130" y="134" text-anchor="middle" font-size="8.5" fill="#166534">accel +</text>
  <line x1="240" y1="105" x2="210" y2="105" stroke="#dc2626" stroke-width="2.5"/>
  <text x="232" y="96" text-anchor="middle" font-size="8.5" fill="#991b1b">friction −</text>
  <g font-size="9" font-family="monospace" fill="#334155">
    <text x="60" y="160">vx += ax        // အရှိန်</text>
    <text x="60" y="176">vx *= 0.9       // ပွတ်တိုက် (ရပ်)</text>
    <text x="60" y="192">x  += vx * dt   // ရွေ့</text>
  </g>
</svg>
