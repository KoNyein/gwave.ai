  <text x="70" y="122" text-anchor="middle" font-size="8.5" fill="#64748b">9906</text>
  <text x="141" y="122" text-anchor="middle" font-size="8.5" fill="#64748b">20957</text>
  <text x="202" y="122" text-anchor="middle" font-size="8.5" fill="#64748b">315</text>
  <text x="271" y="122" text-anchor="middle" font-size="8.5" fill="#64748b">31419</text>
  <text x="337" y="122" text-anchor="middle" font-size="8.5" fill="#64748b">0</text>
  <text x="220" y="150" text-anchor="middle" font-size="10" fill="#334155">token ၅ ခု → ID ဂဏန်း — model က ဂဏန်းသာ တွက်</text>
  <text x="220" y="172" text-anchor="middle" font-size="9.5" fill="#64748b">မြန်မာစာ byte-level ခွဲမို့ token ၂–၃ ဆ ပိုစား (ကုန်ကျ ပိုများ)</text>
