    <rect x="40" y="76" width="60" height="30" rx="6" fill="#dbeafe" stroke="#2563eb"/><text x="70" y="95" fill="#1e40af">Hello</text>
    <rect x="106" y="76" width="70" height="30" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="141" y="95" fill="#166534"> farmers</text>
    <rect x="182" y="76" width="40" height="30" rx="6" fill="#fef3c7" stroke="#d97706"/><text x="202" y="95" fill="#92400e"> of</text>
    <rect x="228" y="76" width="86" height="30" rx="6" fill="#fce7f3" stroke="#db2777"/><text x="271" y="95" fill="#9d174d"> Myanmar</text>
    <rect x="320" y="76" width="34" height="30" rx="6" fill="#ede9fe" stroke="#7c3aed"/><text x="337" y="95" fill="#6d28d9">!</text>
