<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 190" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="188" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Tokenization — model မြင်တဲ့ အတုံးလေးများ</text>
  <text x="220" y="58" text-anchor="middle" font-size="11" fill="#334155">"Hello farmers of Myanmar!"</text>
