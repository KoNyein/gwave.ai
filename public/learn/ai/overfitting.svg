<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="sans-serif">
  <rect x="1" y="1" width="418" height="238" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <line x1="60" y1="190" x2="380" y2="190" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="60" y1="190" x2="60" y2="55" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="385" y="196" font-size="9" fill="#64748b">Training ကြာချိန်</text>
  <text x="58" y="48" text-anchor="end" font-size="9" fill="#64748b">Error</text>
  <path d="M65,80 C130,120 220,160 370,168" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <text x="330" y="158" font-size="10.5" fill="#1e40af" font-weight="bold">Train error ↓</text>
  <path d="M65,85 C140,125 210,128 250,132 C300,140 340,105 372,72" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <text x="330" y="70" font-size="10.5" fill="#dc2626" font-weight="bold">Test error ↑</text>
  <line x1="255" y1="60" x2="255" y2="190" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="255" y="212" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">ဒီမှာ ရပ် (early stop)</text>
  <text x="320" y="120" font-size="9.5" fill="#64748b">→ ကျက်မှတ်စ (overfit)</text>
  <text x="210" y="32" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Overfitting — ကျက်မှတ် vs နားလည်</text>
