  <text x="220" y="80" text-anchor="middle" font-size="10.5" fill="#dc2626" font-weight="bold">attention — ဘယ်စကားလုံးကို ဘယ်လောက် ဂရုစိုက်လဲ</text>
  <text x="220" y="200" text-anchor="middle" font-size="10.5" fill="#334155">"ဆောင်း" က "ထီး" နဲ့ "မိုး" ကို ပြန်ကြည့်ပြီး အဓိပ္ပာယ် နားလည်</text>
  <text x="220" y="32" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Transformer — Attention ယန္တရား</text>
