    <rect x="120" y="140" width="66" height="30" rx="6" fill="#dbeafe" stroke="#2563eb"/><text x="153" y="159" fill="#1e40af">ရွာရင်</text>
    <rect x="200" y="140" width="66" height="30" rx="6" fill="#dbeafe" stroke="#2563eb"/><text x="233" y="159" fill="#1e40af">ထီး</text>
    <rect x="280" y="140" width="66" height="30" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="313" y="159" fill="#92400e">ဆောင်း</text>
