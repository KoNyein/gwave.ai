<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="ig" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">ပုံထုတ် Prompt — အသေးစိတ်လေ ကောင်းလေ</text>
  <rect x="26" y="56" width="180" height="40" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="40" y="72" font-size="9.5" font-weight="bold" fill="#991b1b">❌ "farm"</text>
  <text x="40" y="88" font-size="8.5" fill="#991b1b">မှုန်ဝါး၊ ထင်သလို ထွက်</text>
  <rect x="26" y="104" width="388" height="58" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="40" y="122" font-size="9.5" font-weight="bold" fill="#166534">✅ အကြောင်းအရာ + style + အလင်း + ထောင့်</text>
  <text x="40" y="139" font-size="8.5" fill="#166534">"hydroponic greenhouse, Myanmar, golden morning light,</text>
  <text x="40" y="153" font-size="8.5" fill="#166534"> lush lettuce rows, drone view, photorealistic, 4k"</text>
  <rect x="230" y="56" width="184" height="40" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="244" y="72" font-size="9.5" font-weight="bold" fill="#3730a3">negative prompt</text>
  <text x="244" y="88" font-size="8.5" fill="#3730a3">"blurry, text, watermark" — ဖယ်</text>
  <text x="220" y="184" text-anchor="middle" font-size="10" fill="#334155">ဘာ + ဘယ်လို + ဘယ်နေရာ + ဘယ်ထောင့် — တိကျစွာ ဖော်ပြ</text>
</svg>
