  <path d="M100 100 L126 100" stroke="#d97706" stroke-width="2" marker-end="url(#rl)"/>
  <path d="M194 100 L220 100" stroke="#d97706" stroke-width="2" marker-end="url(#rl)"/>
  <path d="M288 108 L320 108" stroke="#64748b" stroke-width="2" marker-end="url(#rl)"/>
  <text x="147" y="76" text-anchor="middle" font-size="8" fill="#92400e">မှတ်ဉာဏ် သယ်</text>
  <text x="220" y="164" text-anchor="middle" font-size="10" fill="#334155">အရင်တန်ဖိုးများ မှတ်ထား၍ နောက်တစ်ဆင့် ခန့်မှန်း</text>
  <text x="220" y="184" text-anchor="middle" font-size="9.5" fill="#64748b">LSTM gate — အရေးကြီးတာ ကြာကြာမှတ်၊ မလိုတာ မေ့</text>
