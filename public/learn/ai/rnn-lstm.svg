    <text x="161" y="123" text-anchor="middle" font-size="9" fill="#1e40af">29°</text>
    <rect x="222" y="88" width="66" height="46" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="255" y="108" text-anchor="middle" font-size="9" fill="#1e40af">... 24</text>
    <text x="255" y="123" text-anchor="middle" font-size="9" fill="#1e40af">31°</text>
    <rect x="322" y="86" width="86" height="50" rx="9" fill="#dcfce7" stroke="#16a34a"/>
    <text x="365" y="106" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#166534">ခန့်မှန်း</text>
