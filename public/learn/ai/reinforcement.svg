<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 210" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="208" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="r1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Reinforcement Learning — စမ်း၍ သင်</text>
  <rect x="52" y="88" width="120" height="56" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="112" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Agent</text>
  <text x="112" y="128" text-anchor="middle" font-size="9" fill="#1e40af">ဆုံးဖြတ်သူ</text>
  <rect x="268" y="88" width="120" height="56" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="328" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Environment</text>
  <text x="328" y="128" text-anchor="middle" font-size="9" fill="#166534">ပတ်ဝန်းကျင်</text>
  <path d="M172 100 L268 100" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#r1)"/>
  <text x="220" y="94" text-anchor="middle" font-size="9" fill="#334155">Action (လုပ်ဆောင်)</text>
  <path d="M268 132 L172 132" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#r1)"/>
  <text x="220" y="127" text-anchor="middle" font-size="9" fill="#92400e">Reward + State</text>
  <text x="112" y="172" text-anchor="middle" font-size="9" fill="#334155">ဆုရ → ထပ်လုပ်</text>
  <text x="328" y="172" text-anchor="middle" font-size="9" fill="#334155">ဒဏ်ရ → ရှောင်</text>
  <text x="220" y="194" text-anchor="middle" font-size="10" fill="#334155">Explore (ကျပန်းစမ်း) နဲ့ Exploit (သိပြီးသား) မျှ၍ တဖြည်းဖြည်း တော်လာ</text>
</svg>
