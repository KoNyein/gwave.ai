  <g fill="#2563eb"><circle cx="60" cy="150" r="5"/><circle cx="80" cy="140" r="5"/><circle cx="70" cy="120" r="5"/><circle cx="95" cy="155" r="5"/></g>
  <g fill="#db2777"><circle cx="150" cy="90" r="5"/><circle cx="170" cy="100" r="5"/><circle cx="160" cy="115" r="5"/><circle cx="135" cy="82" r="5"/></g>
  <text x="118" y="186" text-anchor="middle" font-size="9" fill="#334155">မျဉ်းက အုပ်စု ၂ ခု ခွဲ (ပိုးရှိ/မရှိ)</text>
