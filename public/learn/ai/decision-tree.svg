<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 210" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="208" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="dt" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#94a3b8"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Decision Tree — မေးခွန်းလိုက် ဆုံးဖြတ်</text>
  <rect x="168" y="46" width="104" height="34" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="220" y="67" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">စိုထိုင်း &gt; 82%?</text>
