  <text x="388" y="187" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#991b1b">🐛 ပိုး</text>
  <text x="120" y="188" text-anchor="middle" font-size="9.5" fill="#334155">လူ ဖတ်လို့ရ — ဘာကြောင့်ဆို ရှင်းပြနိုင်</text>
