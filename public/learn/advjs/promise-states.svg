<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="pr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Promise — အခြေအနေ ၃ ခု</text>
  <rect x="150" y="76" width="140" height="44" rx="10" fill="#fef3c7" stroke="#d97706"/>
  <text x="220" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">pending</text>
  <text x="220" y="112" text-anchor="middle" font-size="8" fill="#92400e">စောင့်ဆဲ</text>
  <rect x="30" y="140" width="150" height="40" rx="9" fill="#dcfce7" stroke="#16a34a"/>
  <text x="105" y="158" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#166534">fulfilled ✓</text>
  <text x="105" y="172" text-anchor="middle" font-size="8" fill="#166534">.then(value)</text>
  <rect x="260" y="140" width="150" height="40" rx="9" fill="#fee2e2" stroke="#dc2626"/>
  <text x="335" y="158" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#991b1b">rejected ✗</text>
  <text x="335" y="172" text-anchor="middle" font-size="8" fill="#991b1b">.catch(error)</text>
  <line x1="185" y1="118" x2="120" y2="138" stroke="#16a34a" stroke-width="2" marker-end="url(#pr)"/>
  <line x1="255" y1="118" x2="320" y2="138" stroke="#dc2626" stroke-width="2" marker-end="url(#pr)"/>
  <text x="220" y="60" text-anchor="middle" font-size="9" fill="#64748b">အနာဂတ်မှာ ရလာမယ့် တန်ဖိုးကို ကိုယ်စားပြု</text>
</svg>
