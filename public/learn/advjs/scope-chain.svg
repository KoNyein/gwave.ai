  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Scope Chain — ဗားရီ ရှာပုံ</text>
  <rect x="40" y="46" width="360" height="120" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="52" y="64" font-size="9" fill="#334155">Global — g = 1</text>
  <rect x="70" y="72" width="300" height="84" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="82" y="90" font-size="9" fill="#1e40af">outer — o = 2</text>
  <rect x="100" y="98" width="250" height="50" rx="8" fill="#dcfce7" stroke="#16a34a"/>
