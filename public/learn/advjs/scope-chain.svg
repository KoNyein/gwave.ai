  <text x="220" y="184" text-anchor="middle" font-size="9.5" fill="#64748b">အတွင်းမှာ မတွေ့ရင် အပြင်ဘက် (parent) ဆီ တစ်ဆင့်ချင်း ရှာတက်</text>
