<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="sans-serif">
  <rect x="1" y="1" width="438" height="198" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <defs><marker id="md" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#64748b"/></marker></defs>
  <text x="220" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">ES Modules — import / export</text>
  <rect x="30" y="60" width="150" height="90" rx="9" fill="#dcfce7" stroke="#16a34a"/>
  <text x="105" y="80" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">math.js</text>
  <text x="42" y="102" font-family="monospace" font-size="8.5" fill="#166534">export function</text>
  <text x="42" y="116" font-family="monospace" font-size="8.5" fill="#166534">  add(a,b){...}</text>
  <text x="42" y="134" font-family="monospace" font-size="8.5" fill="#166534">export const PI</text>
  <line x1="180" y1="105" x2="256" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#md)"/>
  <text x="218" y="98" text-anchor="middle" font-size="8" fill="#334155">import</text>
  <rect x="260" y="60" width="150" height="90" rx="9" fill="#dbeafe" stroke="#2563eb"/>
  <text x="335" y="80" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e40af">app.js</text>
  <text x="272" y="102" font-family="monospace" font-size="8.5" fill="#1e40af">import { add }</text>
  <text x="272" y="116" font-family="monospace" font-size="8.5" fill="#1e40af">  from './math.js'</text>
  <text x="272" y="134" font-family="monospace" font-size="8.5" fill="#1e40af">add(2, 3) // 5</text>
  <text x="220" y="178" text-anchor="middle" font-size="9.5" fill="#334155">code ကို ဖိုင်များ ခွဲ — ပြန်သုံး/ပြုပြင် လွယ်</text>
  <text x="220" y="194" text-anchor="middle" font-size="8.5" fill="#64748b">module တိုင်း သီးသန့် scope — global မညစ်</text>
</svg>
