<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B6D11"/>
      <stop offset="1" stop-color="#1f4406"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <!-- soft leaf circles -->
  <circle cx="880" cy="90" r="220" fill="#ffffff" opacity="0.05"/>
  <circle cx="120" cy="440" r="180" fill="#ffffff" opacity="0.05"/>

  <!-- logo mark -->
  <g transform="translate(80,70)">
    <path d="M0,40 C0,10 30,-10 60,0 C50,30 25,50 0,40 Z" fill="#EAF3DE"/>
    <text x="80" y="34" font-size="44" font-weight="700" fill="#ffffff">gwave.ai</text>
  </g>

  <!-- headline -->
  <text x="80" y="220" font-size="58" font-weight="800" fill="#ffffff">တောင်သူများအတွက်</text>
  <text x="80" y="290" font-size="58" font-weight="800" fill="#EAF3DE">Super-App</text>
  <text x="80" y="345" font-size="27" fill="#d7e8c4">ဆိုရှယ် · အခမဲ့သင်တန်း · စျေးဝယ် · Smart Farm</text>

  <!-- feature chips -->
  <g font-size="21" fill="#1f4406" font-weight="600">
    <g transform="translate(80,390)">
      <rect width="150" height="46" rx="23" fill="#EAF3DE"/>
      <text x="26" y="30">👥 လူမှုကွန်ရက်</text>
    </g>
    <g transform="translate(244,390)">
      <rect width="200" height="46" rx="23" fill="#EAF3DE"/>
      <text x="24" y="30">🎓 သင်တန်း ၆၀×၉</text>
    </g>
    <g transform="translate(458,390)">
      <rect width="130" height="46" rx="23" fill="#EAF3DE"/>
      <text x="24" y="30">🛒 စျေးဝယ်</text>
    </g>
    <g transform="translate(602,390)">
      <rect width="150" height="46" rx="23" fill="#EAF3DE"/>
      <text x="24" y="30">🌱 Smart Farm</text>
    </g>
  </g>

  <!-- phone mockup -->
  <g transform="translate(760,110)">
    <rect x="0" y="0" width="200" height="330" rx="30" fill="#0f2a03" stroke="#EAF3DE" stroke-width="3"/>
    <rect x="14" y="16" width="172" height="298" rx="18" fill="#f6faf0"/>
    <rect x="14" y="16" width="172" height="52" rx="18" fill="#3B6D11"/>
    <text x="100" y="49" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">gwave</text>
    <g fill="#dbe8cb"><rect x="30" y="84" width="140" height="46" rx="10"/><rect x="30" y="142" width="140" height="46" rx="10"/><rect x="30" y="200" width="140" height="46" rx="10"/></g>
    <g fill="#3B6D11"><circle cx="52" cy="107" r="12"/><circle cx="52" cy="165" r="12"/><circle cx="52" cy="223" r="12"/></g>
    <rect x="30" y="266" width="140" height="34" rx="17" fill="#3B6D11"/>
    <text x="100" y="289" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">စတင်မည်</text>
  </g>
</svg>
