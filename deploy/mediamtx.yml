# MediaMTX config for gwave.ai â€” CCTV (RTSPâ†’HLS) + Live (RTMPâ†’HLS).
# Docs: https://github.com/bluenviron/mediamtx

# --- Protocols --------------------------------------------------------------
rtsp: yes
rtspAddress: :8554
rtmp: yes                 # host ingest for Live (OBS / phone) â†’ rtmp://host:1935/live/<key>
rtmpAddress: :1935
hls: yes                  # browser playback (viewers + CCTV player)
hlsAddress: :8888
hlsAllowOrigin: "*"       # Caddy fronts this with TLS; the app CSP allow-lists it
hlsVariant: lowLatency
webrtc: yes               # optional ultra-low-latency path
webrtcAddress: :8889

# --- Control API (register/tear down streams; used by CCTV_MEDIA_API_URL) ---
api: yes
apiAddress: :9997

# --- Paths ------------------------------------------------------------------
paths:
  # Live streams: any key under live/ is accepted (publisher authenticates via
  # the key). Tighten with publishUser/publishPass or an external auth hook.
  live/~^.*$:
    source: publisher

  # CCTV cameras â€” one block per camera. Replace with your RTSP URLs. MediaMTX
  # pulls on demand and republishes as HLS at /cctv/<name>/index.m3u8.
  # cctv/frontgate:
  #   source: rtsp://user:pass@10.0.0.11:554/stream1
  #   sourceOnDemand: yes
  # cctv/warehouse:
  #   source: rtsp://user:pass@10.0.0.12:554/stream1
  #   sourceOnDemand: yes
