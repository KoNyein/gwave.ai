name: gwave
description: Gwave — Myanmar farmers' super-app. Native Android client.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.3.1
  video_player: ^2.8.6
  url_launcher: ^6.2.6
  app_links: ^6.3.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  # POS receipts: build an 80mm receipt PDF and hand it to the Android print
  # dialog (Bluetooth/WiFi receipt printers via print services, or save/share).
  pdf: ^3.11.1
  printing: ^5.13.2
  # Native RTMP(S) camera encoder for in-app live broadcasting to IVS.
  apivideo_live_stream: 1.2.0
  permission_handler: ^11.3.1
  # Walkie-talkie: hold-to-record voice clips (AAC) + clip playback.
  # (6.x — the 5.x line resolves an old record_linux that no longer compiles
  # against record_platform_interface 1.6, breaking even Android builds.)
  record: ^6.0.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  # Language courses: speak phrases with the device TTS engine.
  flutter_tts: ^4.0.2
  # In-app code playground: run lesson HTML/CSS/JS locally in a WebView.
  webview_flutter: ^4.9.0
  # Android WebView controller — grant the GPS map's geolocation prompt.
  # Broad range so it always matches the version webview_flutter resolves.
  webview_flutter_android: ">=3.16.0 <5.0.0"
  # Native GPS map (OpenStreetMap tiles — works without Google Play Services)
  # + device location. Replaces the embedded web map so it looks native.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  # Native 1:1 messenger calls: WebRTC media + Supabase Realtime broadcast
  # signaling (same protocol as the web client, so calls interoperate).
  # >=0.12 dropped the removed v1-embedding `PluginRegistry.Registrar`, which
  # no longer compiles against current Flutter (3.29+). The upper bound is
  # wide so pub can match whatever livekit_client pins.
  flutter_webrtc: ">=0.12.5 <2.0.0"
  realtime_client: ^2.4.0
  # Watch browser Go Live broadcasts (LiveKit SFU) — they publish over WebRTC
  # and have no HLS URL, so the app joins the room as a subscriber.
  livekit_client: ^2.8.0
  # Family locator: BLE proximity scanner to find a family member's phone or
  # tracker tag nearby (signal-strength meter).
  flutter_blue_plus: ^1.32.0
  # Family locator: share/join a circle by tapping an NFC tag with the invite
  # code written on it.
  nfc_manager: ^3.3.0
  # Share posts to other apps (system share sheet).
  nearby_connections: ^4.3.0
  share_plus: ^10.0.0
  # Scan nearby WiFi access points for the crowdsourced WiFi map (WiGLE-style).
  wifi_scan: ^0.4.1
  # Health: PPG heart-rate — cover the rear camera + torch with a fingertip and
  # read the red-channel pulse to draw a live heart-rhythm ("health wave").
  camera: ^0.11.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/

# Branded launcher icon generated from the web app's icon-512.png.
# Run `dart run flutter_launcher_icons` (the CI does this before building).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon-512.png"
  # Adaptive icon: the logo is centred with safe-zone padding on a clean white
  # background so the circular/squircle launcher mask never crops the leaf.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon-foreground.png"
  min_sdk_android: 21
