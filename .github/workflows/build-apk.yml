# Builds the gwave.ai Android app (Trusted Web Activity) with Bubblewrap and
# uploads the signed APK + Play Store AAB as workflow artifacts.
#
# Run it from GitHub → Actions → "Build Android APK (TWA)" → Run workflow.
#
# Signing: if the ANDROID_KEYSTORE_BASE64 secret is set, that keystore is
# used (add ANDROID_KEYSTORE_PASSWORD alongside it). Otherwise a keystore is
# generated on the fly and uploaded as an artifact — DOWNLOAD AND KEEP IT:
# Play Store updates must be signed with the same key forever.
name: Build Android APK (TWA)

on:
  workflow_dispatch:

permissions:
  # write: publish the signed APK as a GitHub Release asset. Release assets
  # do NOT count against the Actions artifact-storage quota, so the download
  # link works even when that quota is full.
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'gwave-android-2026' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Point Bubblewrap at the runner's JDK and Android SDK
        run: |
          # Bubblewrap validates the SDK by looking for <sdk>/tools or
          # <sdk>/bin (legacy layouts) and expects sdkmanager there; modern
          # SDKs only ship cmdline-tools/latest/bin — bridge with a symlink.
          if [ ! -e "$ANDROID_HOME/bin" ]; then
            ln -s "$ANDROID_HOME/cmdline-tools/latest/bin" "$ANDROID_HOME/bin" \
              || sudo ln -s "$ANDROID_HOME/cmdline-tools/latest/bin" "$ANDROID_HOME/bin"
          fi
          ls "$ANDROID_HOME/bin/" | head -5
          ls "$ANDROID_HOME/build-tools/" || true
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Prepare signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            # The secret is pasted from a terminal, which smuggles in line
            # wraps / CR and sometimes surrounding text (shell prompt, byte
            # counts). Recover the keystore instead of decoding blindly: a
            # PKCS#12 file base64-encodes to "MII…", so try every MII-anchored
            # base64 run and keep the longest one that decodes to an ASN.1
            # SEQUENCE (0x30 0x82).
            python3 - <<'EOF'
          import base64, os, re, subprocess, sys

          s = re.sub(r"\s+", "", os.environ["KEYSTORE_B64"])
          ks_pass = os.environ["KS_PASS"]
          # A run whose length is not a multiple of 4 lost either its trailing
          # padding (copy stopped short: re-pad) or gained merged junk at the
          # end (trim). Try both repairs for every candidate and let keytool —
          # which validates the PKCS#12 MAC — decide which one is the real
          # keystore.
          cands = []
          for m in re.finditer(r"MII[A-Za-z0-9+/]+={0,2}", s):
              c = m.group(0)
              r = len(c) % 4
              if r == 0:
                  cands.append(c)
              else:
                  if r >= 2:
                      cands.append(c + "=" * (4 - r))
                  cands.append(c[: len(c) - r])
          decodable = False
          for c in sorted(set(cands), key=len, reverse=True):
              try:
                  data = base64.b64decode(c)
              except Exception:
                  continue
              if not data.startswith(b"\x30\x82"):
                  continue
              decodable = True
              with open("android.keystore", "wb") as f:
                  f.write(data)
              ok = subprocess.run(
                  ["keytool", "-list", "-keystore", "android.keystore",
                   "-alias", "gwave", "-storepass", ks_pass],
                  capture_output=True,
              ).returncode == 0
              if ok:
                  print(f"Recovered keystore: {len(data)} bytes")
                  sys.exit(0)
          if decodable:
              sys.exit("Keystore data decoded, but no candidate opened with alias 'gwave' and the configured password. Either the base64 tail is missing more than padding (re-create ANDROID_KEYSTORE_BASE64 with only the full base64 text) or ANDROID_KEYSTORE_PASSWORD does not match the keystore.")
          sys.exit("ANDROID_KEYSTORE_BASE64 contains no decodable keystore data")
          EOF
            echo "KEYSTORE_FROM_SECRET=1" >> "$GITHUB_ENV"
            echo "Using keystore from repository secret."
          else
            keytool -genkeypair -v -keystore android.keystore -alias gwave \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" -keypass "$KS_PASS" \
              -dname "CN=gwave.ai, OU=gwave, O=gwave, L=Yangon, C=MM"
            echo "Generated a new keystore — keep the artifact for future updates!"
          fi

      - name: Generate the Android project from twa-manifest.json
        run: bubblewrap update --skipVersionUpgrade

      - name: Build signed APK + AAB
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'gwave-android-2026' }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'gwave-android-2026' }}
        run: bubblewrap build --skipPwaValidation

      - name: Export SHA-256 fingerprint + assetlinks.json
        run: |
          keytool -list -v -keystore android.keystore -alias gwave -storepass "$KS_PASS" \
            | grep -E "SHA256:" | head -1 | sed 's/.*SHA256: //' > fingerprint.txt
          FP=$(cat fingerprint.txt)
          cat > assetlinks.json <<EOF
          [{
            "relation": ["delegate_permission/common.handle_all_urls"],
            "target": {
              "namespace": "android_app",
              "package_name": "ai.gwave.app",
              "sha256_cert_fingerprints": ["$FP"]
            }
          }]
          EOF
          echo "SHA-256: $FP"

      - name: List build outputs
        run: ls -la *.apk *.aab 2>/dev/null || ls -la

      # Publish everything as a GitHub Release instead of workflow artifacts.
      # Release assets don't count against the Actions artifact-storage quota
      # (which had filled up and blocked the artifact uploads), and they give
      # a stable, permanent download page instead of a 90-day-expiring zip.
      - name: Publish signed APK, AAB, and keystore to a GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="android-build-${{ github.run_number }}"
          # Re-runs reuse the run number; clear any prior release/tag so the
          # publish is idempotent.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          # The signing keystore is only published when it was generated on the
          # fly (so the operator can rescue it). When it comes from the
          # repository secret, the private key must NOT be exposed as a public
          # release asset.
          EXTRA=""
          if [ -z "${KEYSTORE_FROM_SECRET:-}" ]; then
            EXTRA="android.keystore"
          fi
          gh release create "$TAG" \
            app-release-signed.apk \
            app-release-bundle.aab \
            $EXTRA \
            fingerprint.txt \
            assetlinks.json \
            --latest \
            --title "Gwave Android build #${{ github.run_number }}" \
            --notes "Download **app-release-signed.apk** and sideload it on a phone to test. **app-release-bundle.aab** is for the Play Console. SHA-256 fingerprint is in fingerprint.txt. Signed with the repository's pinned keystore when the ANDROID_KEYSTORE_BASE64 secret is set — updates install cleanly over previous builds signed with the same key."
