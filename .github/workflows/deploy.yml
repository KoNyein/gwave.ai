name: Build and Deploy to ECR & EC2

# Build the gwave.cc app image -> push to ECR (150897468627 / ap-southeast-1 /
# gwave-web) -> roll it out on the app EC2 via SSM running `sudo gwave-redeploy`
# (which pulls :gwave, canaries on :3001, swaps :3000 with --env-file, and
# auto-rolls-back). Do NOT `docker run` by hand from CI: that skips the secrets
# env-file, the canary, and collides with Caddy on port 80.
#
# Builds the COMMITTED code on the triggering branch — commit anything prod
# still needs before relying on this.

on:
  # main was reconciled back to production (2026-07-16): the old diverged main was
  # retired and replaced with the deployed prod code, so main is once again the
  # canonical prod branch. CI deploys from main. (Old main is archived at the tag
  # archive/main-pre-retire if the diverged history is ever needed.)
  workflow_dispatch: {} # manual "Run workflow" button (deploy.yml is on the default branch main, so this works)
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never interrupt an in-flight production deploy

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: gwave-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Static keys (your approach). For keyless auth instead, drop these two
      # lines, add `role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}`, and give
      # the job `permissions: { id-token: write, contents: read }`.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # REQUIRED: every NEXT_PUBLIC_* is inlined into the client bundle AND the
      # CSP at build time. Omit one and the feature it powers silently breaks.
      # Values come from repo Variables (public) + one Secret (TURN credential).
      - name: Build, tag & push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ vars.NEXT_PUBLIC_SITE_URL }}" \
            --build-arg NEXT_PUBLIC_LIVEKIT_URL="${{ vars.NEXT_PUBLIC_LIVEKIT_URL }}" \
            --build-arg NEXT_PUBLIC_TURN_URL="${{ vars.NEXT_PUBLIC_TURN_URL }}" \
            --build-arg NEXT_PUBLIC_TURN_USERNAME="${{ vars.NEXT_PUBLIC_TURN_USERNAME }}" \
            --build-arg NEXT_PUBLIC_TURN_CREDENTIAL="${{ secrets.NEXT_PUBLIC_TURN_CREDENTIAL }}" \
            --build-arg NEXT_PUBLIC_CCTV_PLAYER_ORIGIN="${{ vars.NEXT_PUBLIC_CCTV_PLAYER_ORIGIN }}" \
            --build-arg NEXT_PUBLIC_CCTV_HLS_ORIGINS="${{ vars.NEXT_PUBLIC_CCTV_HLS_ORIGINS }}" \
            --build-arg NEXT_PUBLIC_CCTV_APP="${{ vars.NEXT_PUBLIC_CCTV_APP }}" \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_COGNITO_DOMAIN="${{ vars.NEXT_PUBLIC_COGNITO_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_COGNITO_CLIENT_ID="${{ vars.NEXT_PUBLIC_COGNITO_CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_S3_CDN="${{ vars.NEXT_PUBLIC_S3_CDN }}" \
            --build-arg NEXT_PUBLIC_VAPID_PUBLIC_KEY="${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}" \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}" \
            -t "$IMAGE:gwave" \
            -t "$IMAGE:${{ github.sha }}" \
            .
          docker push "$IMAGE:gwave"
          docker push "$IMAGE:${{ github.sha }}"
          echo "Pushed $IMAGE:gwave and :${{ github.sha }}"

      # Deploy via SSM (no SSH key needed). Runs the SAME gwave-redeploy prod uses
      # — env-file, canary, auto-rollback — instead of a hand-rolled docker run.
      # Requires: SSM Agent on the box + the instance role has AmazonSSMManagedInstanceCore.
      - name: Deploy on EC2 via SSM (gwave-redeploy)
        env:
          INSTANCE_ID: ${{ vars.APP_INSTANCE_ID }} # e.g. i-0207c3c6180868996
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy gwave-web:gwave" \
            --parameters commands='["sudo /usr/local/bin/gwave-redeploy"]' \
            --query 'Command.CommandId' --output text)
          echo "SSM CommandId: $CMD_ID — waiting for completion..."
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text)
          echo "----- redeploy output -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
          echo "SSM status: $STATUS"
          [ "$STATUS" = "Success" ] || { echo "::error::redeploy failed"; exit 1; }
