# Build the web image on GitHub's runners (never the small EC2 box, so a build
# can't OOM/freeze the server) and push it to Amazon ECR. Optionally SSHes into
# the server afterwards to pull + restart, so a push to main goes fully live.
#
# ONE-TIME SETUP — repository secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY  — IAM user with ECR push access
# Optional (enables the auto server restart; otherwise run
# deploy/ecr-redeploy.sh on the box yourself after each build):
#   DEPLOY_HOST     — server public IP/host (e.g. 18.139.214.180)
#   DEPLOY_USER     — SSH user (ubuntu)
#   DEPLOY_SSH_KEY  — a private SSH key whose public key is in the box's
#                     ~/.ssh/authorized_keys
name: Build & deploy web image (ECR)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ecr-web-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 150897468627.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: gwave-web
  IMAGE_TAG: gwave

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # NEXT_PUBLIC_* are baked into the client bundle at build time. These four
      # are the values the live image already ships and are all public
      # (publishable anon key, public URLs), so they live here rather than in
      # secrets. Runtime secrets (service-role key, Cognito secret, VAPID
      # private, SUPABASE_JWT_SECRET, …) are injected at `docker run` on the
      # server, never baked in.
      - name: Build and push to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://gwave.cc/sb
            NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_YvEEpSVK9YfKfllA0KW0RQ_7T7f_gsV
            NEXT_PUBLIC_SITE_URL=https://gwave.cc
            NEXT_PUBLIC_LIVEKIT_URL=wss://52-77-195-25.sslip.io
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push the fresh ECR login token to the server and run the redeploy
      # script there (pull + recreate the gwave-web container). Skips cleanly
      # when the DEPLOY_* secrets aren't set — the image is still in ECR and you
      # can run deploy/ecr-redeploy.sh on the box by hand.
      - name: Restart the server on the new image (over SSH)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::notice::SSH deploy not configured. Image pushed to ECR — run 'bash deploy/ecr-redeploy.sh' on the server to go live."
            exit 0
          fi
          TOKEN=$(aws ecr get-login-password --region "$AWS_REGION")
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "echo '$TOKEN' | sudo docker login --username AWS --password-stdin '$ECR_REGISTRY' && sudo bash /home/ubuntu/app/gwave.ai/deploy/ecr-redeploy.sh"
