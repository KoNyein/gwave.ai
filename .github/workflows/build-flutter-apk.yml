name: Build Flutter APK

# Native Android client (mobile/). The platform folders (android/) are NOT
# committed — they're scaffolded fresh here with `flutter create`, so the repo
# only tracks Dart source + pubspec. Run from the Actions tab (workflow_dispatch)
# or on pushes that touch mobile/.
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "APK build mode"
        type: choice
        default: release
        options: [release, debug]
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/build-flutter-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Scaffold the android/ platform folder (gitignored) around the tracked
      # lib/ + pubspec, pin the applicationId, and add the INTERNET permission —
      # Flutter only puts it in the debug manifest, so release APKs have no
      # network (every request fails "Failed host lookup ... errno = 7") without it.
      - name: Scaffold Android platform
        run: |
          flutter create --org ai.gwave --project-name gwave --platforms=android .
          for G in android/app/build.gradle android/app/build.gradle.kts; do
            [ -f "$G" ] || continue
            sed -i 's/applicationId "ai.gwave.gwave"/applicationId "ai.gwave.app"/' "$G"
            sed -i 's/applicationId = "ai.gwave.gwave"/applicationId = "ai.gwave.app"/' "$G"
          done
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          python3 - "$MANIFEST" <<'PY'
          import sys
          p = sys.argv[1]
          s = open(p).read()
          if 'android.permission.INTERNET' not in s:
              s = s.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.INTERNET" />\n'
                  '    <application',
                  1,
              )
          # Camera for the G-Pay QR scanner (mobile_scanner). The plugin merges
          # its own permission, but declare it explicitly so a manifest-merge
          # hiccup can't ship a scanner that can never open the camera. Marked
          # not-required so the APK still installs on camera-less devices.
          if 'android.permission.CAMERA' not in s:
              s = s.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.CAMERA" />\n'
                  '    <uses-feature android:name="android.hardware.camera" android:required="false" />\n'
                  '    <application',
                  1,
              )
          # Microphone for native live broadcasting (apivideo_live_stream).
          if 'android.permission.RECORD_AUDIO' not in s:
              s = s.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.RECORD_AUDIO" />\n'
                  '    <application',
                  1,
              )
          # Android 11+ package visibility: without declaring the TTS_SERVICE
          # intent, flutter_tts cannot bind the device speech engine and the
          # language courses play no audio (speak() silently no-ops).
          if 'android.intent.action.TTS_SERVICE' not in s:
              s = s.replace(
                  '<application',
                  '<queries>\n'
                  '        <intent>\n'
                  '            <action android:name="android.intent.action.TTS_SERVICE" />\n'
                  '        </intent>\n'
                  '    </queries>\n'
                  '    <application',
                  1,
              )
          # Deep link for the Cognito Hosted UI Google redirect (gwave://auth),
          # caught by app_links to finish native Google sign-in.
          if 'android:scheme="gwave"' not in s:
              intent = (
                  '<intent-filter>\n'
                  '                <action android:name="android.intent.action.VIEW" />\n'
                  '                <category android:name="android.intent.category.DEFAULT" />\n'
                  '                <category android:name="android.intent.category.BROWSABLE" />\n'
                  '                <data android:scheme="gwave" android:host="auth" />\n'
                  '            </intent-filter>\n'
                  '        </activity>'
              )
              s = s.replace('</activity>', intent, 1)
          open(p, 'w').write(s)
          print("Patched manifest: INTERNET permission + gwave:// deep link")
          PY
          grep -q 'android.permission.INTERNET' "$MANIFEST" || (echo "INTERNET permission injection failed" && exit 1)
          grep -q 'android:scheme="gwave"' "$MANIFEST" || (echo "deep link injection failed" && exit 1)

          # Photo-protection (screenshot / screen-record block). MainActivity.kt is
          # scaffolded fresh by `flutter create` above, so — like the manifest
          # patches — the FLAG_SECURE MethodChannel handler must be re-injected on
          # every build or photo protection silently no-ops. Dart side:
          # lib/core/secure_screen.dart drives channel ai.gwave.app/secure_screen.
          # Package stays ai.gwave.gwave (only applicationId became ai.gwave.app).
          K=android/app/src/main/kotlin/ai/gwave/gwave/MainActivity.kt
          mkdir -p "$(dirname "$K")"
          cat > "$K" <<'KOTLIN'
          package ai.gwave.gwave

          import android.view.WindowManager
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          // FLAG_SECURE bridge for protected photos. Dart singleton SecureScreen
          // (lib/core/secure_screen.dart) invokes enableSecure/disableSecure over this
          // channel; the flag makes Android refuse screenshots + screen recording and
          // blanks the recents-switcher thumbnail while a protected view is on screen.
          class MainActivity : FlutterActivity() {
              private val secureChannel = "ai.gwave.app/secure_screen"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, secureChannel)
                      .setMethodCallHandler { call, result ->
                          when (call.method) {
                              "enableSecure" -> {
                                  runOnUiThread {
                                      window.addFlags(WindowManager.LayoutParams.FLAG_SECURE)
                                  }
                                  result.success(null)
                              }
                              "disableSecure" -> {
                                  runOnUiThread {
                                      window.clearFlags(WindowManager.LayoutParams.FLAG_SECURE)
                                  }
                                  result.success(null)
                              }
                              else -> result.notImplemented()
                          }
                      }
              }
          }
          KOTLIN
          grep -q 'FLAG_SECURE' "$K" || (echo "FLAG_SECURE MainActivity injection failed" && exit 1)
          echo "Injected MainActivity FLAG_SECURE secure_screen channel"

          # Some pub plugins (native_device_orientation, pulled in by
          # apivideo_live_stream) still pin compileSdk 31, which AGP hard-fails
          # against modern androidx deps. Force every Android subproject up to
          # the app's compileSdk. Reflection keeps the root script compiling
          # even though AGP types aren't on the root classpath.
          # NOTE: the Flutter template's own `subprojects { evaluationDependsOn(":app") }`
          # force-evaluates :app during root configuration, so registering
          # afterEvaluate unconditionally throws "already evaluated" for it.
          # Skip evaluated projects — only :app can be, and it's already on 36.
          if [ -f android/build.gradle.kts ]; then
            cat >> android/build.gradle.kts <<'KTS'

          subprojects {
              if (state.executed) return@subprojects
              afterEvaluate {
                  val androidExt = extensions.findByName("android") ?: return@afterEvaluate
                  try {
                      androidExt.javaClass.methods.firstOrNull {
                          it.name == "compileSdkVersion" &&
                              it.parameterTypes.size == 1 &&
                              it.parameterTypes[0] == Int::class.javaPrimitiveType
                      }?.invoke(androidExt, 36)
                  } catch (_: Exception) {
                  }
              }
          }
          KTS
          elif [ -f android/build.gradle ]; then
            cat >> android/build.gradle <<'GROOVY'

          subprojects { p ->
              if (p.state.executed) return
              p.afterEvaluate { proj ->
                  def androidExt = proj.extensions.findByName("android")
                  if (androidExt != null) {
                      try { androidExt.compileSdkVersion 36 } catch (Exception e) {}
                  }
              }
          }
          GROOVY
          fi
          echo "Patched root gradle: subproject compileSdk floor 36"

      # Release signing. A debug-signed APK can't update an install signed with a
      # different key (Android refuses "signatures do not match" and forces an
      # uninstall/reinstall). Decode the upload keystore, prove the expected alias
      # is present, write android/key.properties, and rewrite the scaffolded
      # build.gradle.kts — whose template release buildType signs with the DEBUG
      # key — to sign release with the upload key instead.
      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD repo secrets" >&2
            exit 1
          fi
          # Expected upload-key alias. The owner's keystore was created with this
          # alias (the convention the Play upload key uses); verify it is really
          # present and fail loudly with the actual alias list if not, so a
          # mismatched keystore can never silently fall through to a bad signing.
          ALIAS="gwave-upload"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          if ! keytool -list -keystore android/app/upload-keystore.jks \
                -storepass "$ANDROID_KEYSTORE_PASSWORD" > keytool-list.txt 2>&1; then
            echo "keytool -list failed — wrong ANDROID_KEYSTORE_PASSWORD or corrupt keystore:" >&2
            cat keytool-list.txt >&2
            exit 1
          fi
          if ! grep -q "^${ALIAS}," keytool-list.txt; then
            echo "Expected key alias '${ALIAS}' not found in keystore. Aliases present:" >&2
            grep -iE 'PrivateKeyEntry|Alias name' keytool-list.txt >&2 || true
            exit 1
          fi
          echo "Verified key alias '${ALIAS}' is present in the keystore"
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ALIAS}
          storeFile=upload-keystore.jks
          EOF
          # Patch android/app/build.gradle.kts: load key.properties, add a
          # `release` signingConfig, and point buildTypes.release at it instead of
          # the template's `signingConfigs.getByName("debug")`.
          python3 - android/app/build.gradle.kts <<'PY'
          import sys
          p = sys.argv[1]
          s = open(p, encoding="utf-8").read()

          if 'import java.util.Properties' not in s:
              s = 'import java.util.Properties\nimport java.io.FileInputStream\n\n' + s

          if 'val keystoreProperties' not in s:
              loader = (
                  'val keystoreProperties = Properties()\n'
                  'val keystorePropertiesFile = rootProject.file("key.properties")\n'
                  'if (keystorePropertiesFile.exists()) {\n'
                  '    keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n'
                  '}\n\n'
              )
              idx = s.index('\nandroid {')
              s = s[:idx + 1] + loader + s[idx + 1:]

          if 'signingConfigs {' not in s:
              signing = (
                  '    signingConfigs {\n'
                  '        create("release") {\n'
                  '            keyAlias = keystoreProperties["keyAlias"] as String?\n'
                  '            keyPassword = keystoreProperties["keyPassword"] as String?\n'
                  '            storeFile = (keystoreProperties["storeFile"] as String?)?.let { file(it) }\n'
                  '            storePassword = keystoreProperties["storePassword"] as String?\n'
                  '        }\n'
                  '    }\n\n'
              )
              marker = 'android {\n'
              idx = s.index(marker) + len(marker)
              s = s[:idx] + signing + s[idx:]

          before = 'signingConfig = signingConfigs.getByName("debug")'
          after = 'signingConfig = signingConfigs.getByName("release")'
          if before in s:
              s = s.replace(before, after)
          elif after not in s:
              sys.exit("ERROR: could not find release buildType signingConfig to rewire")

          open(p, 'w', encoding="utf-8").write(s)
          assert 'getByName("release")' in s, "release signingConfig not wired"
          assert 'getByName("debug")' not in s, "release build still points at debug key"
          assert 'create("release")' in s, "release signingConfig block missing"
          print("Patched build.gradle.kts: release signingConfig wired to upload key")
          PY

      - name: Pub get
        run: flutter pub get

      - name: Generate launcher icon
        run: dart run flutter_launcher_icons

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build APK
        env:
          API_BASE: ${{ vars.MOBILE_API_BASE || 'https://gwave.cc' }}
          SUPABASE_URL: ${{ secrets.MOBILE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.MOBILE_SUPABASE_ANON_KEY }}
          IVS_RECORDING_BASE: ${{ vars.MOBILE_IVS_RECORDING_BASE }}
        run: |
          MODE="${{ github.event.inputs.build_mode || 'release' }}"
          flutter build apk --"$MODE" \
            --dart-define=API_BASE="$API_BASE" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=IVS_RECORDING_BASE="$IVS_RECORDING_BASE"

      # Prove the release APK carries the upload key, not the Flutter debug key.
      # If the gradle patch ever silently fails, the build still succeeds but ships
      # a debug-signed APK that can't update installs — so fail the job instead.
      - name: Verify APK is release-signed
        if: ${{ (github.event.inputs.build_mode || 'release') == 'release' }}
        run: |
          set -euo pipefail
          APK=build/app/outputs/flutter-apk/app-release.apk
          APKSIGNER=$(ls "${ANDROID_SDK_ROOT:-$ANDROID_HOME}"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          [ -n "$APKSIGNER" ] || APKSIGNER=$(command -v apksigner || true)
          [ -n "$APKSIGNER" ] || { echo "apksigner not found on runner" >&2; exit 1; }
          CERTS=$("$APKSIGNER" verify --print-certs "$APK")
          echo "$CERTS"
          if echo "$CERTS" | grep -qi 'CN=Android Debug'; then
            echo "APK is DEBUG-signed — release signing did not take effect" >&2
            exit 1
          fi
          echo "$CERTS" | grep -q 'certificate DN' || { echo "no signer certificate found" >&2; exit 1; }
          echo "APK is release-signed (not the Android debug key)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gwave-flutter-apk
          path: mobile/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      # Give a stable, phone-friendly direct download (a single .apk, not a
      # zipped artifact). Overwrites the `mobile-latest` release each build so
      # the link always points at the newest APK.
      - name: Name APK for release
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/gwave.apk

      - name: Publish APK to Release
        if: ${{ (github.event.inputs.build_mode || 'release') == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-latest
          name: Gwave APK (latest)
          body: |
            Latest native Gwave Android app. Download **gwave.apk** below and
            install it (enable "Install unknown apps" for your browser first).
            Rebuilt automatically on every push to the mobile app.
          files: mobile/build/app/outputs/flutter-apk/gwave.apk
          fail_on_unmatched_files: true
          make_latest: "true"
