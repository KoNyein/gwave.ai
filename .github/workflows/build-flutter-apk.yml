name: Build Flutter APK

# Native Android client (mobile/). The platform folders (android/) are NOT
# committed — they're scaffolded fresh here with `flutter create`, so the repo
# only tracks Dart source + pubspec. Run from the Actions tab (workflow_dispatch)
# or on pushes that touch mobile/.
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "APK build mode"
        type: choice
        default: release
        options: [release, debug]
  push:
    # ONLY the canonical mobile dev branch builds & publishes the APK. Web
    # branches (claude/** off main) and main itself do NOT carry the mobile-only
    # features (native audio store / health hub / call fixes live only here), so
    # building from them produced a feature-stripped APK that clobbered the
    # rolling mobile-latest release. Restricting the trigger prevents that.
    branches:
      - claude/phase-1-implementation-7ysxtj
    paths:
      - "mobile/**"
      - ".github/workflows/build-flutter-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Scaffold the android/ platform folder (gitignored) around the tracked
      # lib/ + pubspec, pin the applicationId, and add the INTERNET permission —
      # Flutter only puts it in the debug manifest, so release APKs have no
      # network (every request fails "Failed host lookup ... errno = 7") without it.
      - name: Scaffold Android platform
        run: |
          flutter create --org ai.gwave --project-name gwave --platforms=android .
          for G in android/app/build.gradle android/app/build.gradle.kts; do
            [ -f "$G" ] || continue
            sed -i 's/applicationId "ai.gwave.gwave"/applicationId "ai.gwave.app"/' "$G"
            sed -i 's/applicationId = "ai.gwave.gwave"/applicationId = "ai.gwave.app"/' "$G"
          done
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          python3 - "$MANIFEST" <<'PY'
          import sys
          p = sys.argv[1]
          s = open(p).read()
          if 'android.permission.INTERNET' not in s:
              s = s.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.INTERNET" />\n'
                  '    <application',
                  1,
              )
          # Camera for the G-Pay QR scanner (mobile_scanner). The plugin merges
          # its own permission, but declare it explicitly so a manifest-merge
          # hiccup can't ship a scanner that can never open the camera. Marked
          # not-required so the APK still installs on camera-less devices.
          if 'android.permission.CAMERA' not in s:
              s = s.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.CAMERA" />\n'
                  '    <uses-feature android:name="android.hardware.camera" android:required="false" />\n'
                  '    <application',
                  1,
              )
          # NFC for the Family locator's tap-to-join invite tags. Marked
          # not-required so phones without NFC can still install the APK.
          # (Bluetooth permissions come from flutter_blue_plus's own manifest.)
          if 'android.permission.NFC' not in s:
              s = s.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.NFC" />\n'
                  '    <uses-feature android:name="android.hardware.nfc" android:required="false" />\n'
                  '    <application',
                  1,
              )
          # Microphone for native live broadcasting (apivideo_live_stream).
          if 'android.permission.RECORD_AUDIO' not in s:
              s = s.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.RECORD_AUDIO" />\n'
                  '    <application',
                  1,
              )
          # Offline nearby chat (Google Nearby Connections): Android 12+ splits
          # Bluetooth into runtime permissions, and 13+ adds nearby-wifi.
          if 'android.permission.BLUETOOTH_ADVERTISE' not in s:
              s = s.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.BLUETOOTH_ADVERTISE" />\n'
                  '    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n'
                  '    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />\n'
                  '    <uses-permission android:name="android.permission.NEARBY_WIFI_DEVICES" android:usesPermissionFlags="neverForLocation" />\n'
                  '    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />\n'
                  '    <uses-permission android:name="android.permission.CHANGE_WIFI_STATE" />\n'
                  '    <application',
                  1,
              )
          # Location for the GPS map — the embedded map's geolocation ("find me",
          # live tracking) is denied without these, so it can't locate the user.
          if 'android.permission.ACCESS_FINE_LOCATION' not in s:
              s = s.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n'
                  '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n'
                  '    <application',
                  1,
              )
          # Android 11+ package visibility: without declaring the TTS_SERVICE
          # intent, flutter_tts cannot bind the device speech engine and the
          # language courses play no audio (speak() silently no-ops).
          if 'android.intent.action.TTS_SERVICE' not in s:
              s = s.replace(
                  '<application',
                  '<queries>\n'
                  '        <intent>\n'
                  '            <action android:name="android.intent.action.TTS_SERVICE" />\n'
                  '        </intent>\n'
                  '    </queries>\n'
                  '    <application',
                  1,
              )
          # Android 11+ package visibility for url_launcher: without a browser
          # (VIEW https) intent in <queries>, launching the Cognito/Google
          # sign-in page (and other web links) can silently fail.
          if 'android.intent.action.VIEW' not in s or 'android:scheme="https"' not in s:
              s = s.replace(
                  '<application',
                  '<queries>\n'
                  '        <intent>\n'
                  '            <action android:name="android.intent.action.VIEW" />\n'
                  '            <data android:scheme="https" />\n'
                  '        </intent>\n'
                  '        <intent>\n'
                  '            <action android:name="android.intent.action.VIEW" />\n'
                  '            <data android:scheme="http" />\n'
                  '        </intent>\n'
                  '    </queries>\n'
                  '    <application',
                  1,
              )
          # Deep link for the Cognito Hosted UI Google redirect (gwave://auth),
          # caught by app_links to finish native Google sign-in.
          if 'android:scheme="gwave"' not in s:
              intent = (
                  '<intent-filter>\n'
                  '                <action android:name="android.intent.action.VIEW" />\n'
                  '                <category android:name="android.intent.category.DEFAULT" />\n'
                  '                <category android:name="android.intent.category.BROWSABLE" />\n'
                  '                <data android:scheme="gwave" android:host="auth" />\n'
                  '            </intent-filter>\n'
                  '        </activity>'
              )
              s = s.replace('</activity>', intent, 1)
          open(p, 'w').write(s)
          print("Patched manifest: INTERNET permission + gwave:// deep link")
          PY
          grep -q 'android.permission.INTERNET' "$MANIFEST" || (echo "INTERNET permission injection failed" && exit 1)
          grep -q 'android:scheme="gwave"' "$MANIFEST" || (echo "deep link injection failed" && exit 1)

          # Some pub plugins (native_device_orientation, pulled in by
          # apivideo_live_stream) still pin compileSdk 31, which AGP hard-fails
          # against modern androidx deps. Force every Android subproject up to
          # the app's compileSdk. Reflection keeps the root script compiling
          # even though AGP types aren't on the root classpath.
          # NOTE: the Flutter template's own `subprojects { evaluationDependsOn(":app") }`
          # force-evaluates :app during root configuration, so registering
          # afterEvaluate unconditionally throws "already evaluated" for it.
          # Skip evaluated projects — only :app can be, and it's already on 36.
          if [ -f android/build.gradle.kts ]; then
            cat >> android/build.gradle.kts <<'KTS'

          subprojects {
              if (state.executed) return@subprojects
              afterEvaluate {
                  val androidExt = extensions.findByName("android") ?: return@afterEvaluate
                  try {
                      androidExt.javaClass.methods.firstOrNull {
                          it.name == "compileSdkVersion" &&
                              it.parameterTypes.size == 1 &&
                              it.parameterTypes[0] == Int::class.javaPrimitiveType
                      }?.invoke(androidExt, 36)
                  } catch (_: Exception) {
                  }
              }
          }
          KTS
          elif [ -f android/build.gradle ]; then
            cat >> android/build.gradle <<'GROOVY'

          subprojects { p ->
              if (p.state.executed) return
              p.afterEvaluate { proj ->
                  def androidExt = proj.extensions.findByName("android")
                  if (androidExt != null) {
                      try { androidExt.compileSdkVersion 36 } catch (Exception e) {}
                  }
              }
          }
          GROOVY
          fi
          echo "Patched root gradle: subproject compileSdk floor 36"

      # Release signing with the same upload keystore the main-branch signed CI
      # uses, so APKs from either workflow carry the SAME signature and users
      # can update in place instead of uninstalling. Skips gracefully (debug
      # signing, the old behavior) while the keystore secrets aren't set yet.
      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          # Unlike the strict main-branch signed CI, these rolling dev builds
          # fall back to debug signing when the keystore is missing OR broken —
          # a bad secret must not stop the owner from getting app updates.
          bail() {
            echo "::warning::$1 — falling back to debug signing for this build"
            rm -f android/app/upload-keystore.jks android/key.properties
            exit 0
          }
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ]; then
            bail "Keystore secrets not set"
          fi
          ALIAS="gwave-upload"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks || bail "ANDROID_KEYSTORE_BASE64 is not valid base64"
          if ! keytool -list -keystore android/app/upload-keystore.jks \
                -storepass "$ANDROID_KEYSTORE_PASSWORD" > keytool-list.txt 2>&1; then
            cat keytool-list.txt >&2 || true
            bail "keytool -list failed (wrong ANDROID_KEYSTORE_PASSWORD or corrupt keystore)"
          fi
          if ! grep -q "^${ALIAS}," keytool-list.txt; then
            grep -iE 'PrivateKeyEntry|Alias name' keytool-list.txt >&2 || true
            bail "Key alias '${ALIAS}' not found in keystore"
          fi
          echo "Verified key alias '${ALIAS}' is present in the keystore"
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ALIAS}
          storeFile=upload-keystore.jks
          EOF
          python3 - android/app/build.gradle.kts <<'PY'
          import sys
          p = sys.argv[1]
          s = open(p, encoding="utf-8").read()

          if 'import java.util.Properties' not in s:
              s = 'import java.util.Properties\nimport java.io.FileInputStream\n\n' + s

          if 'val keystoreProperties' not in s:
              loader = (
                  'val keystoreProperties = Properties()\n'
                  'val keystorePropertiesFile = rootProject.file("key.properties")\n'
                  'if (keystorePropertiesFile.exists()) {\n'
                  '    keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n'
                  '}\n\n'
              )
              idx = s.index('\nandroid {')
              s = s[:idx + 1] + loader + s[idx + 1:]

          if 'signingConfigs {' not in s:
              signing = (
                  '    signingConfigs {\n'
                  '        create("release") {\n'
                  '            keyAlias = keystoreProperties["keyAlias"] as String?\n'
                  '            keyPassword = keystoreProperties["keyPassword"] as String?\n'
                  '            storeFile = (keystoreProperties["storeFile"] as String?)?.let { file(it) }\n'
                  '            storePassword = keystoreProperties["storePassword"] as String?\n'
                  '        }\n'
                  '    }\n\n'
              )
              marker = 'android {\n'
              idx = s.index(marker) + len(marker)
              s = s[:idx] + signing + s[idx:]

          before = 'signingConfig = signingConfigs.getByName("debug")'
          after = 'signingConfig = signingConfigs.getByName("release")'
          if before in s:
              s = s.replace(before, after)
          elif after not in s:
              sys.exit("ERROR: could not find release buildType signingConfig to rewire")

          open(p, 'w', encoding="utf-8").write(s)
          assert 'getByName("release")' in s, "release signingConfig not wired"
          assert 'getByName("debug")' not in s, "release build still points at debug key"
          assert 'create("release")' in s, "release signingConfig block missing"
          print("Patched build.gradle.kts: release signingConfig wired to upload key")
          PY

      - name: Pub get
        run: flutter pub get

      - name: Generate launcher icon
        run: dart run flutter_launcher_icons

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build APK
        env:
          API_BASE: ${{ vars.MOBILE_API_BASE || 'https://gwave.cc' }}
          SUPABASE_URL: ${{ secrets.MOBILE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.MOBILE_SUPABASE_ANON_KEY }}
          IVS_RECORDING_BASE: ${{ vars.MOBILE_IVS_RECORDING_BASE }}
        run: |
          MODE="${{ github.event.inputs.build_mode || 'release' }}"
          # A monotonically growing versionCode: without it every APK ships as
          # 1.0.0+1 and some Android skins refuse/skip installing "the same
          # version" over the old app, so users keep running stale builds.
          # The run number also shows up in Settings → App info for support.
          DEFINES=(
            --dart-define=API_BASE="$API_BASE"
            --dart-define=SUPABASE_URL="$SUPABASE_URL"
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
            --dart-define=IVS_RECORDING_BASE="$IVS_RECORDING_BASE"
            --dart-define=APP_BUILD=${{ github.run_number }}
          )
          # Universal APK (runs on every phone) — the recommended download.
          flutter build apk --"$MODE" \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number="${{ github.run_number }}" \
            "${DEFINES[@]}"
          # Smaller per-architecture APKs so users can grab a lighter build for
          # their device (arm64-v8a, armeabi-v7a, x86_64). Flutter offsets each
          # split's versionCode by its ABI, so a phone only ever installs the
          # matching one.
          flutter build apk --"$MODE" --split-per-abi \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number="${{ github.run_number }}" \
            "${DEFINES[@]}"

      # Prove the release APK carries the upload key when signing was
      # configured. Skipped when the tolerant signing step fell back to debug
      # (key.properties absent), so dev builds keep flowing on bad secrets.
      - name: Verify APK is release-signed
        if: ${{ (github.event.inputs.build_mode || 'release') == 'release' }}
        run: |
          set -euo pipefail
          if [ ! -f android/key.properties ]; then
            echo "Release signing not configured — debug-signed dev build, skipping verify"
            exit 0
          fi
          APK=build/app/outputs/flutter-apk/app-release.apk
          APKSIGNER=$(ls "${ANDROID_SDK_ROOT:-$ANDROID_HOME}"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          [ -n "$APKSIGNER" ] || APKSIGNER=$(command -v apksigner || true)
          [ -n "$APKSIGNER" ] || { echo "apksigner not found on runner" >&2; exit 1; }
          CERTS=$("$APKSIGNER" verify --print-certs "$APK")
          echo "$CERTS"
          if echo "$CERTS" | grep -qi 'CN=Android Debug'; then
            echo "APK is DEBUG-signed — release signing did not take effect" >&2
            exit 1
          fi
          echo "APK is release-signed (not the Android debug key)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gwave-flutter-apk
          path: mobile/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      # Give a stable, phone-friendly direct download (a single .apk, not a
      # zipped artifact). Overwrites the `mobile-latest` release each build so
      # the link always points at the newest APK.
      - name: Name APKs for release
        run: |
          cd build/app/outputs/flutter-apk
          # Universal (recommended) + per-architecture builds, each renamed to a
          # stable, phone-friendly filename the /download/apk route serves.
          cp app-release.apk gwave.apk
          [ -f app-arm64-v8a-release.apk ]   && cp app-arm64-v8a-release.apk   gwave-arm64-v8a.apk   || true
          [ -f app-armeabi-v7a-release.apk ] && cp app-armeabi-v7a-release.apk gwave-armeabi-v7a.apk || true
          [ -f app-x86_64-release.apk ]      && cp app-x86_64-release.apk      gwave-x86_64.apk      || true
          # Version manifest: the app polls this to show the in-app
          # "update available" banner.
          echo '{"build": ${{ github.run_number }}, "name": "1.0.${{ github.run_number }}"}' > version.json
          ls -la gwave*.apk version.json

      - name: Publish APK to Release
        if: ${{ (github.event.inputs.build_mode || 'release') == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-latest
          name: Gwave APK (latest)
          body: |
            Latest native Gwave Android app. Download **gwave.apk** (works on
            every phone) and install it (enable "Install unknown apps" for your
            browser first). Smaller per-device builds are also attached:
            arm64-v8a (most phones), armeabi-v7a (older phones), x86_64.
            Rebuilt automatically on every push to the mobile app.
          files: |
            mobile/build/app/outputs/flutter-apk/gwave.apk
            mobile/build/app/outputs/flutter-apk/gwave-arm64-v8a.apk
            mobile/build/app/outputs/flutter-apk/gwave-armeabi-v7a.apk
            mobile/build/app/outputs/flutter-apk/gwave-x86_64.apk
            mobile/build/app/outputs/flutter-apk/version.json
          fail_on_unmatched_files: false
          make_latest: "true"
